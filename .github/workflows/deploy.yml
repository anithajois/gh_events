name: Deploy
on: [push]
jobs:
 lint:
  runs-on: ubuntu-latest
  steps:
   - name: Git Code
     uses: actions/checkout@v3
   - name: Install NodeJS
     uses: actions/setup-node@v3
     with:
      node-version: 18
   - name: Install Dependencies
     run: npm ci
   - name: Run Lint
     run: npm run lint
 test:
  needs: lint
  runs-on: ubuntu-latest
  steps:
   - name: Git Code
     uses: actions/checkout@v3
   - name: Install NodeJS
     uses: actions/setup-node@v3
     with:
      node-version: 18
   - name: Install Dependencies
     run: npm ci
   - name: Run Tests
     run: npm run test
 deploy:
  needs: test
  runs-on: ubuntu-latest
  steps:
   - name: Git Code
     uses: actions/checkout@v3
   - name: Install Dependencies
     run: npm ci
   - name: Build Projects
     run: npm run build
   - name: upload Artificts
     uses: actions/artifacts@v3
     with:
      name: dis-files
      path: |
       dist
       package.json
