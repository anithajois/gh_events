name: Deploy
on: push
jobs:
 build:
  runs-on: ubuntu-latest
  steps:
   - name: Deploy Files
     uses: actions/checkout@v3
   - name: Install dependencies
     run: npm ci
   - name: Test code
     run: npm run test
   - name: Build code
     run: npm run build
   - name: Upload Artifacts
     uses: actions/upload-artifact@v4
     with:
      name: dist-files
      path: dist